version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dropchain_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dropchain
    ports:
      - "5434:5432"

  redis:
    image: redis:7
    container_name: dropchain_redis
    ports:
      - "6379:6379"